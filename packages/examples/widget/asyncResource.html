<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>async-resource</title>
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/common.css" />
  </head>

  <style>
    #app {
      width: 100%;
      height: 100%;
    }
  </style>

  <body>
    <div id="app"></div>

    <script type="module">
      import { DisplayEngineWidget } from "@vis-three/engine-display-widget";
      import { GridHelperPlugin } from "@vis-three/plugin-grid-helper";
      import {
        defineComponent,
        h,
        reactive,
        vfor,
        watch,
      } from "@vis-three/widget";

      const engine = new DisplayEngineWidget()
        .install(GridHelperPlugin())
        .setDom(document.getElementById("app"))
        .setSize()
        .play();

      const root = defineComponent({
        async resources({ setup }) {
          return {
            shoe: await setup.load(),
          };
        },
        render({ resources, components }) {
          h("DirectionalLight", {
            intensity: 2,
            position: {
              x: 5,
              z: 10,
              y: 10,
            },
          });

          h("LoadObject3D", {
            url: resources.shoe,
            scale: {
              x: 80,
              y: 80,
              z: 80,
            },
          });
        },
        setup({ engine }) {
          return {
            load: () =>
              new Promise((resolve) => {
                const url =
                  "/model/glb/MaterialsVariantsShoe/MaterialsVariantsShoe.gltf";

                engine.loaderManager.addEventListener("loaded", (e) => {
                  resolve(e.resourceMap.get(url).scene);
                });

                engine.loaderManager.load([url]);
              }),
          };
        },
      });

      const widget = engine.createWidget(root).mount();

      window.widget = widget;
      window.engine = engine;
    </script>
  </body>
</html>
